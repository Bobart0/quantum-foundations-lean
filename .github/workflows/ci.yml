name: CI
on:
  push:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Garde anti-axiome
        run: bash scripts/guard.sh

  build:
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - uses: actions/checkout@v4
      # leanprover/lean-action installe elan, récupère le cache Mathlib et lance `lake build`.
      # TODO(M0) : vérifier les options exactes de l'action à la première exécution.
      - uses: leanprover/lean-action@v1

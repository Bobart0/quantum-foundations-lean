name: CI
on:
  push:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Garde anti-axiome
        run: bash scripts/guard.sh

  build:
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - uses: actions/checkout@v4
      # leanprover/lean-action détecte le workspace Lake, récupère le cache Mathlib
      # (lake exe cache get) et lance `lake build` — aucune option supplémentaire
      # nécessaire pour ce projet (config par défaut vérifiée).
      - uses: leanprover/lean-action@v1
